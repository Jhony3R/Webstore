<div class="min-h-screen flex bg-[#F5F2EA]" style="font-family: 'Inter', sans-serif;">

  <!-- Overlay mobile -->
  <div *ngIf="sidebarOpen()" (click)="closeSidebar()" class="fixed inset-0 bg-black/40 z-30 lg:hidden"></div>

  <!-- Sidebar -->
  <aside
    class="fixed lg:sticky top-0 h-screen w-64 bg-[#1C2333] flex flex-col z-40 transition-transform duration-200 lg:translate-x-0"
    [class.-translate-x-full]="!sidebarOpen()">
    <div class="flex items-center gap-3 px-6 h-16 border-b border-white/10">
      <div class="w-8 h-8 rounded-sm bg-[#C9A15C] flex items-center justify-center text-[#1C2333] text-xs font-bold"
        style="font-family: 'Fraunces', serif;">
        K&amp;R
      </div>
      <div class="leading-tight">
        <p class="text-white text-sm font-semibold" style="font-family: 'Fraunces', serif;">Importaciones K y R</p>
        <p class="text-[#8B8778] text-[11px]">Panel de gestión</p>
      </div>
    </div>

    <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-0.5">

      <a *ngFor="let item of visibleNavItems"
        [routerLink]="item.route"
        routerLinkActive="bg-white/10 text-white"
        [routerLinkActiveOptions]="{ exact: false }"
        (click)="closeSidebar()"
        class="flex items-center gap-3 px-3 py-2.5 rounded-md text-[#C4C1B4] text-sm font-medium hover:bg-white/5 hover:text-white transition"
      >
        <svg class="h-[18px] w-[18px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <ng-container [ngSwitch]="item.icon">
            <path *ngSwitchCase="'home'" stroke-linecap="round" stroke-linejoin="round" d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h4a1 1 0 001-1v-4h2v4a1 1 0 001 1h4a1 1 0 001-1V10"/>
            <path *ngSwitchCase="'cart'" stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293A1 1 0 005 17h12M9 21a1 1 0 100-2 1 1 0 000 2zm8 0a1 1 0 100-2 1 1 0 000 2z"/>
            <path *ngSwitchCase="'cash'" stroke-linecap="round" stroke-linejoin="round" d="M3 6h18v12H3V6zm9 3a3 3 0 100 6 3 3 0 000-6zM5 6v.01M19 6v.01M5 18v-.01M19 18v-.01"/>
            <path *ngSwitchCase="'tag'" stroke-linecap="round" stroke-linejoin="round" d="M20.59 13.41L11 3.83A2 2 0 009.53 3.2L4 3v5.53a2 2 0 00.63 1.46l9.58 9.58a2 2 0 002.83 0l3.55-3.55a2 2 0 000-2.83zM7 7.5h.01"/>
            <path *ngSwitchCase="'grid'" stroke-linecap="round" stroke-linejoin="round" d="M4 4h7v7H4V4zm9 0h7v7h-7V4zM4 13h7v7H4v-7zm9 0h7v7h-7v-7z"/>
            <path *ngSwitchCase="'adjust'" stroke-linecap="round" stroke-linejoin="round" d="M9 4H5a1 1 0 00-1 1v4m0 6v4a1 1 0 001 1h4m6 0h4a1 1 0 001-1v-4m0-6V5a1 1 0 00-1-1h-4M8 12h8"/>
            <path *ngSwitchCase="'truck'" stroke-linecap="round" stroke-linejoin="round" d="M3 7h11v8H3V7zm11 3h4l3 3v2h-7v-5zM6.5 19a1.5 1.5 0 100-3 1.5 1.5 0 000 3zm12 0a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"/>
            <path *ngSwitchCase="'building'" stroke-linecap="round" stroke-linejoin="round" d="M4 21V7l8-4 8 4v14M9 21v-6h6v6M4 21h16M9 9h.01M9 13h.01M15 9h.01M15 13h.01"/>
            <path *ngSwitchCase="'users'" stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m5-2.13a4 4 0 100-8 4 4 0 000 8zm6 2a4 4 0 100-8 4 4 0 000 8z"/>
            <path *ngSwitchCase="'chart'" stroke-linecap="round" stroke-linejoin="round" d="M4 19V9m6 10V5m6 14v-7m6 7V3"/>
            <path *ngSwitchCase="'shield'" stroke-linecap="round" stroke-linejoin="round" d="M12 3l7 3v6c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6l7-3z"/>
          </ng-container>
        </svg>
        {{ item.label }}
      </a>
    </nav>

    <div class="p-3 border-t border-white/10">
      <button (click)="logout()"
        class="w-full flex items-center gap-3 px-3 py-2.5 rounded-md text-[#C4C1B4] text-sm font-medium hover:bg-[#7C2D3B]/20 hover:text-white transition">
        <svg class="h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M17 16l4-4m0 0l-4-4m4 4H7m0-9H5a2 2 0 00-2 2v14a2 2 0 002 2h2" />
        </svg>
        Cerrar sesión
      </button>
    </div>
  </aside>

  <!-- Contenido -->
  <div class="flex-1 flex flex-col min-w-0">
    <!-- Topbar -->
    <header
      class="h-16 bg-white border-b border-[#E4DFD3] flex items-center justify-between px-4 lg:px-8 sticky top-0 z-20">
      <button (click)="toggleSidebar()" class="lg:hidden text-[#1C2333]">
        <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>

      <div class="hidden lg:block"></div>

      <div class="flex items-center gap-3">
        <div class="text-right leading-tight hidden sm:block">
          <p class="text-sm font-medium text-[#1C2333]">{{ username() }}</p>
          <p class="text-xs text-[#7C2D3B] font-medium">{{ rol() }}</p>
        </div>
        <div
          class="w-9 h-9 rounded-full bg-[#1C2333] text-[#C9A15C] flex items-center justify-center text-sm font-semibold"
          style="font-family: 'Fraunces', serif;">
          {{ username().charAt(0).toUpperCase() }}
        </div>
      </div>
    </header>

    <main class="flex-1 p-4 lg:p-8">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
