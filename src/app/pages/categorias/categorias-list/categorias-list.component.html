<div style="font-family: 'Inter', sans-serif;">

  <!-- Encabezado -->
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6">
    <div>
      <p class="text-xs font-semibold tracking-[0.2em] text-[#7C2D3B] uppercase">Inventario</p>
      <h1 class="text-2xl text-[#1C2333] mt-1" style="font-family: 'Fraunces', serif; font-weight: 600;">
        Categorías
      </h1>
    </div>
    <button (click)="nuevaCategoria()"
      class="inline-flex items-center gap-2 rounded-md bg-[#1C2333] px-4 py-2.5 text-sm font-semibold text-white hover:bg-[#7C2D3B] transition">
      <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
      </svg>
      Nueva categoría
    </button>
  </div>

  <!-- Filtros -->
  <div class="bg-white rounded-lg border border-[#E4DFD3] p-4 mb-5 flex flex-col sm:flex-row gap-3">
    <div class="relative flex-1">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-[#B3AC9C]" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7" />
        <path stroke-linecap="round" d="M21 21l-4-4" />
      </svg>
      <input type="text" [ngModel]="busqueda()" (ngModelChange)="busqueda.set($event)"
        placeholder="Buscar por nombre o descripción..."
        class="w-full rounded-md border border-[#E4DFD3] pl-9 pr-3 py-2 text-sm text-[#1C2333] placeholder:text-[#B3AC9C] focus:outline-none focus:ring-2 focus:ring-[#7C2D3B]/30 focus:border-[#7C2D3B]" />
    </div>

    <select [ngModel]="filtroEstado()" (ngModelChange)="filtroEstado.set($event)"
      class="rounded-md border border-[#E4DFD3] px-3 py-2 text-sm text-[#1C2333] focus:outline-none focus:ring-2 focus:ring-[#7C2D3B]/30">
      <option value="TODOS">Todos los estados</option>
      <option value="ACTIVO">Activos</option>
      <option value="INACTIVO">Inactivos</option>
    </select>
  </div>

  <!-- Tabla -->
  <div class="bg-white rounded-lg border border-[#E4DFD3] overflow-hidden">

    <div *ngIf="cargando()" class="p-10 text-center text-sm text-[#8B8778]">
      Cargando categorías...
    </div>

    <div *ngIf="!cargando() && categoriasFiltradas().length === 0" class="p-10 text-center">
      <p class="text-sm text-[#8B8778]">No se encontraron categorías con esos filtros.</p>
    </div>

    <div *ngIf="!cargando() && categoriasFiltradas().length > 0" class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="text-left text-[#8B8778] text-xs uppercase tracking-wide border-b border-[#E4DFD3]">
            <th class="px-5 py-3 font-medium">Nombre</th>
            <th class="px-5 py-3 font-medium">Descripción</th>
            <th class="px-5 py-3 font-medium text-center">Estado</th>
            <th class="px-5 py-3 font-medium text-right">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let categoria of categoriasFiltradas()"
            class="border-b border-[#F0EDE3] last:border-0 hover:bg-[#FAF6EF]">
            <td class="px-5 py-3 font-medium text-[#1C2333]">{{ categoria.nombre }}</td>
            <td class="px-5 py-3 text-[#3A362F] max-w-[320px] truncate">{{ categoria.descripcion || '—' }}</td>
            <td class="px-5 py-3 text-center">
              <span class="inline-block px-2 py-0.5 rounded-full text-[11px] font-medium"
                [ngClass]="categoria.activo ? 'bg-[#1C2333]/5 text-[#1C2333]' : 'bg-red-50 text-red-500'">
                {{ categoria.activo ? 'Activo' : 'Inactivo' }}
              </span>
            </td>
            <td class="px-5 py-3">
              <div class="flex items-center justify-end gap-2">
                <!-- Editar -->
                <button (click)="editarCategoria(categoria.idCategoria!)" title="Editar categoría"
                  class="p-1.5 rounded-md text-[#7C2D3B] hover:bg-[#7C2D3B]/10 transition">
                  <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                      d="M11 5H6a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2v-5" />
                    <path stroke-linecap="round" stroke-linejoin="round"
                      d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                  </svg>
                </button>

                <!-- Desactivar / Reactivar -->
                <button (click)="toggleEstado(categoria)"
                  [title]="categoria.activo ? 'Desactivar categoría' : 'Reactivar categoría'"
                  class="p-1.5 rounded-md transition" [class.text-red-500]="categoria.activo"
                  [class.hover:bg-red-50]="categoria.activo" [class.text-emerald-600]="!categoria.activo"
                  [class.hover:bg-emerald-50]="!categoria.activo">
                  <svg *ngIf="categoria.activo" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                      d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 11v6M14 11v6" />
                  </svg>
                  <svg *ngIf="!categoria.activo" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v6h6M20 20v-6h-6" />
                    <path stroke-linecap="round" stroke-linejoin="round"
                      d="M4 10a8 8 0 0 1 14.5-4.5M20 14a8 8 0 0 1-14.5 4.5" />
                  </svg>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
