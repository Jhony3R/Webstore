<div style="font-family: 'Inter', sans-serif;" class="w-full">

  <div class="mb-8">
    <p class="text-xs font-semibold tracking-[0.2em] text-[#7C2D3B] uppercase">Inventario</p>
    <h1 class="text-3xl text-[#1C2333] mt-1.5" style="font-family: 'Fraunces', serif; font-weight: 600;">
      {{ esEdicion ? 'Editar producto' : 'Nuevo producto' }}
    </h1>
    <p class="text-sm text-[#8B8778] mt-1.5">
      {{ esEdicion ? 'Actualiza la información del producto seleccionado.' : 'Completa los datos para registrar un nuevo producto en el inventario.' }}
    </p>
  </div>

  <form (ngSubmit)="guardar()" class="bg-white rounded-xl border border-[#E4DFD3] shadow-sm overflow-hidden">

    <!-- Sección: Información general -->
    <div class="p-7 space-y-5 border-b border-[#F0EDE3]">
      <div class="flex items-center gap-2 mb-1">
        <div class="h-7 w-7 rounded-md bg-[#7C2D3B]/10 flex items-center justify-center">
          <svg class="h-4 w-4 text-[#7C2D3B]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="7" width="18" height="13" rx="2"/>
            <path stroke-linecap="round" d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </div>
        <h2 class="text-sm font-semibold text-[#1C2333] uppercase tracking-wide">Información general</h2>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
        <div>
          <label class="block text-sm font-medium text-[#3A362F] mb-1.5">Código *</label>
          <input
            type="text"
            [(ngModel)]="producto.codigo"
            name="codigo"
            required
            placeholder="ej. POL-001"
            class="w-full rounded-md border border-[#E4DFD3] px-3.5 py-2.5 text-sm text-[#1C2333] placeholder:text-[#B3AC9C] focus:outline-none focus:ring-2 focus:ring-[#7C2D3B]/30 focus:border-[#7C2D3B]"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-[#3A362F] mb-1.5">Marca</label>
          <input
            type="text"
            [(ngModel)]="producto.marca"
            name="marca"
            placeholder="ej. Nike"
            class="w-full rounded-md border border-[#E4DFD3] px-3.5 py-2.5 text-sm text-[#1C2333] placeholder:text-[#B3AC9C] focus:outline-none focus:ring-2 focus:ring-[#7C2D3B]/30 focus:border-[#7C2D3B]"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-[#3A362F] mb-1.5">Color</label>
          <input
            type="text"
            [(ngModel)]="producto.color"
            name="color"
            placeholder="ej. Azul"
            class="w-full rounded-md border border-[#E4DFD3] px-3.5 py-2.5 text-sm text-[#1C2333] placeholder:text-[#B3AC9C] focus:outline-none focus:ring-2 focus:ring-[#7C2D3B]/30 focus:border-[#7C2D3B]"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-[#3A362F] mb-1.5">Talla</label>
          <input
            type="text"
            [(ngModel)]="producto.talla"
            name="talla"
            placeholder="ej. M"
            class="w-full rounded-md border border-[#E4DFD3] px-3.5 py-2.5 text-sm text-[#1C2333] placeholder:text-[#B3AC9C] focus:outline-none focus:ring-2 focus:ring-[#7C2D3B]/30 focus:border-[#7C2D3B]"
          />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-[#3A362F] mb-1.5">Descripción *</label>
        <input
          type="text"
          [(ngModel)]="producto.descripcion"
          name="descripcion"
          required
          placeholder="ej. Polo básico cuello redondo"
          class="w-full rounded-md border border-[#E4DFD3] px-3.5 py-2.5 text-sm text-[#1C2333] placeholder:text-[#B3AC9C] focus:outline-none focus:ring-2 focus:ring-[#7C2D3B]/30 focus:border-[#7C2D3B]"
        />
      </div>
    </div>

    <!-- Sección: Precios -->
    <div class="p-7 space-y-5 border-b border-[#F0EDE3] bg-[#FAF6EF]/40">
      <div class="flex items-center gap-2 mb-1">
        <div class="h-7 w-7 rounded-md bg-[#7C2D3B]/10 flex items-center justify-center">
          <svg class="h-4 w-4 text-[#7C2D3B]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
        </div>
        <h2 class="text-sm font-semibold text-[#1C2333] uppercase tracking-wide">Precios</h2>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
        <div>
          <label class="block text-sm font-medium text-[#3A362F] mb-1.5">Precio de compra (S/)</label>
          <div class="relative">
            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-sm text-[#B3AC9C]">S/</span>
            <input
              type="number"
              step="0.01"
              min="0"
              [(ngModel)]="producto.precioCompra"
              name="precioCompra"
              class="w-full rounded-md border border-[#E4DFD3] pl-8 pr-3.5 py-2.5 text-sm text-[#1C2333] bg-white focus:outline-none focus:ring-2 focus:ring-[#7C2D3B]/30 focus:border-[#7C2D3B]"
            />
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-[#3A362F] mb-1.5">Precio de venta (S/) *</label>
          <div class="relative">
            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-sm text-[#B3AC9C]">S/</span>
            <input
              type="number"
              step="0.01"
              min="0"
              [(ngModel)]="producto.precioVenta"
              name="precioVenta"
              required
              class="w-full rounded-md border border-[#E4DFD3] pl-8 pr-3.5 py-2.5 text-sm text-[#1C2333] bg-white focus:outline-none focus:ring-2 focus:ring-[#7C2D3B]/30 focus:border-[#7C2D3B]"
            />
          </div>
        </div>
      </div>
    </div>

    <!-- Sección: Inventario -->
    <div class="p-7 space-y-5">
      <div class="flex items-center gap-2 mb-1">
        <div class="h-7 w-7 rounded-md bg-[#7C2D3B]/10 flex items-center justify-center">
          <svg class="h-4 w-4 text-[#7C2D3B]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 8l-9-5-9 5 9 5 9-5zM3 8v8l9 5 9-5V8M12 13v8"/>
          </svg>
        </div>
        <h2 class="text-sm font-semibold text-[#1C2333] uppercase tracking-wide">Inventario</h2>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
        <div>
          <label class="block text-sm font-medium text-[#3A362F] mb-1.5">Stock actual</label>
          <input
            type="number"
            min="0"
            [(ngModel)]="producto.stockActual"
            name="stockActual"
            class="w-full rounded-md border border-[#E4DFD3] px-3.5 py-2.5 text-sm text-[#1C2333] focus:outline-none focus:ring-2 focus:ring-[#7C2D3B]/30 focus:border-[#7C2D3B]"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-[#3A362F] mb-1.5">Stock mínimo</label>
          <input
            type="number"
            min="0"
            [(ngModel)]="producto.stockMinimo"
            name="stockMinimo"
            class="w-full rounded-md border border-[#E4DFD3] px-3.5 py-2.5 text-sm text-[#1C2333] focus:outline-none focus:ring-2 focus:ring-[#7C2D3B]/30 focus:border-[#7C2D3B]"
          />
        </div>
      </div>
    </div>

    <!-- Footer de acciones -->
    <div class="flex items-center justify-end gap-3 px-7 py-5 bg-[#FAF6EF] border-t border-[#E4DFD3]">
      <button
        type="button"
        (click)="cancelar()"
        class="px-4 py-2.5 rounded-md text-sm font-medium text-[#6B6558] hover:bg-white transition"
      >
        Cancelar
      </button>
      <button
        type="submit"
        [disabled]="guardando"
        class="px-6 py-2.5 rounded-md bg-[#1C2333] text-sm font-semibold text-white hover:bg-[#7C2D3B] transition disabled:opacity-60 shadow-sm"
      >
        {{ guardando ? 'Guardando...' : (esEdicion ? 'Guardar cambios' : 'Crear producto') }}
      </button>
    </div>
  </form>
</div>
